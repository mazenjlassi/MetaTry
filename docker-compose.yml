services:
  mysql:
    image: mysql:8.0
    container_name: metatry-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: metatry
      MYSQL_USER: metatryuser
      MYSQL_PASSWORD: metatrypass
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - metatry-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  app:
    build: .
    container_name: metatry-app
    ports:
      - "8081:8080"
    volumes:
      - ./uploads:/app/uploads  # ← Ajoute cette ligne
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/metatry?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: metatryuser
      SPRING_DATASOURCE_PASSWORD: metatrypass
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "true"
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.MySQLDialect
      JWT_SECRET: my-super-secret-key-for-docker-environment
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - metatry-network
    restart: unless-stopped

volumes:
  mysql-data:

networks:
  metatry-network:
    driver: bridge